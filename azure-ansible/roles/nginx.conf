# === MAIN CONTEXT ===
user  nginx; # a directive in the 'main' context
worker_processes  auto;
error_log  /var/log/nginx.error_log  info;

# === EVENTS CONTEXT ===
events {
    # configuration of connection processing
    worker_connections   1024;
}

# === HTTP CONTEXT ===
http {

    log_format main      '$remote_addr - $remote_user [$time_local] '
                             '"$request" $status $bytes_sent '
                             '"$http_referer" "$http_user_agent" '
                             '"$gzip_ratio"';

    # Configuration specific to HTTP and affecting all virtual servers
    server {
        # configuration of HTTP virtual server 1
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        # configuration of HTTP virtual server 2
        listen        443 ssl http2;
        server_name   _;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        access_log   /var/log/nginx.access_log  main;

        location / {
            # configuration for processing URIs starting with '/'
            proxy_pass         http://wordpress:80;
            proxy_redirect     off;

            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto  $scheme;
        }

        location /phpma/ {
            # configuration for processing URIs starting with '/phpma'
            proxy_pass http://phpmyadmin:80/;

            proxy_set_header Host $host;                                  # Preserves the original domain name
            proxy_set_header X-Real-IP $remote_addr;                      # Sends the real IP address
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Keeps track of all proxies traversed
            proxy_set_header X-Forwarded-Proto $scheme;                   # Tells WordPress whether it's HTTP or HTTPS
        }
    }


}

# === STREAM CONTEXT (OPTIONNEL - pas utilisé ici) ===
# C'est pour TCP/UDP RAW (pas HTTP/HTTPS)
# Exemples: load balancing TCP, proxy DNS, etc.
